name: Publish MARM MCP Server

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v2.1, v2.1, etc.
  workflow_dispatch:  # Allow manual triggering

permissions:
  id-token: write  # Required for GitHub OIDC authentication
  contents: read

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('marm-mcp-server/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e './marm-mcp-server[dev]'

      - name: Validate server.json
        run: |
          cd marm-mcp-server
          python validate_server_json.py

      - name: Run tests
        working-directory: marm-mcp-server
        run: python -m pytest tests/ -v

      - name: Test server startup
        run: |
          # Test that the server can start up
          cd marm-mcp-server
          timeout 10s python -m marm_mcp_server || echo "Server startup test completed"

  publish-pypi:
    needs: validate-and-test
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine setuptools wheel

      - name: Build package
        run: python -m build
        working-directory: marm-mcp-server

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: marm-mcp-server/dist/
          skip-existing: true

  publish-docker:
    needs: validate-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from pyproject.toml
        id: version
        run: |
          echo "DEBUG: GITHUB_REF = $GITHUB_REF"
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "DEBUG: Extracted version from tag: $VERSION"
          else
            VERSION=$(grep '^version = ' marm-mcp-server/pyproject.toml | cut -d '"' -f 2)
            echo "DEBUG: Extracted version from pyproject.toml: $VERSION"
          fi
          echo "DEBUG: Final version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Debug Docker tags
        run: |
          echo "DEBUG: Will create Docker tags:"
          echo "  - lyellr88/marm-mcp-server:${{ steps.version.outputs.version }}"
          echo "  - lyellr88/marm-mcp-server:latest"
          echo "  - lyellr88/marm-dashboard:${{ steps.version.outputs.version }}"
          echo "  - lyellr88/marm-dashboard:latest"

      - name: Build and push MCP server Docker image
        uses: docker/build-push-action@v5
        with:
          context: marm-mcp-server
          push: true
          tags: |
            lyellr88/marm-mcp-server:${{ steps.version.outputs.version }}
            lyellr88/marm-mcp-server:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=marm-mcp-server
          cache-to: type=gha,scope=marm-mcp-server,mode=max

      - name: Build and push Dashboard Docker image
        uses: docker/build-push-action@v5
        with:
          context: marm-dashboard
          push: true
          tags: |
            lyellr88/marm-dashboard:${{ steps.version.outputs.version }}
            lyellr88/marm-dashboard:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=marm-dashboard
          cache-to: type=gha,scope=marm-dashboard,mode=max

  publish-mcp-registry:
    needs: [validate-and-test, publish-pypi, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Set version in server.json
        run: |
          cd marm-mcp-server
          VERSION=$(grep '^version = ' pyproject.toml | cut -d '"' -f 2)
          jq --arg v "$VERSION" '.version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Publish server to MCP Registry
        run: |
          cd marm-mcp-server
          ../mcp-publisher publish

  notify-success:
    needs: [publish-docker, publish-pypi, publish-mcp-registry]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Success notification
        run: |
          echo "MARM MCP Server published successfully!"
          echo "PyPI: https://pypi.org/project/marm-mcp-server/"
          echo "Docker MCP: https://hub.docker.com/r/lyellr88/marm-mcp-server"
          echo "Docker Dashboard: https://hub.docker.com/r/lyellr88/marm-dashboard"
          echo "MCP Registry: https://registry.modelcontextprotocol.io/servers/io.github.Lyellr88/marm-mcp-server"
