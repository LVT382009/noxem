<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
    <!-- ========================================== -->
    <!-- EMBEDDED CSS ANIMATIONS & STYLES           -->
    <!-- ========================================== -->
    <style>
        svg { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        /* Slowed Kinetic Trace Animations with longer segments */
        .pulse-trace {
            stroke-dasharray: 140 420;
            animation: trace-flow-slow 16.2s linear infinite;
        }

        .pulse-trace-fast {
            stroke-dasharray: 90 270;
            animation: trace-flow-fast 10.8s linear infinite;
        }

        @keyframes trace-flow-slow {
            from { stroke-dashoffset: 0; }
            to   { stroke-dashoffset: -560; }
        }

        @keyframes trace-flow-fast {
            from { stroke-dashoffset: 0; }
            to   { stroke-dashoffset: -360; }
        }

        /* Softened Solder Joint / Node Pulsing */
        .glowing-node {
            animation: node-glow 3s ease-in-out infinite alternate;
            transform-origin: center;
        }

        @keyframes node-glow {
            0% { opacity: 0.12; }
            100% { opacity: 0.40; }
        }
    </style>

    <!-- ========================================== -->
    <!-- DEFINITIONS: Gradients and Filters         -->
    <!-- ========================================== -->
    <defs>
        <!-- Background Gradient: Deep charcoal to cool slate grey -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#14161f" />
            <stop offset="50%" stop-color="#21242e" />
            <stop offset="100%" stop-color="#191b22" />
        </linearGradient>

        <!-- Text Glow Gradient: Proton Mint Green to Surgical Laser Teal -->
        <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00ffaa" />
            <stop offset="100%" stop-color="#00bfff" />
        </linearGradient>

        <!-- Loading Bar Gradient: Matching Mint to Deep Teal -->
        <linearGradient id="bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00ffaa" />
            <stop offset="50%" stop-color="#00e5ff" />
            <stop offset="100%" stop-color="#00bfff" />
        </linearGradient>

        <!-- Ground Plane Hatch Pattern (Subdued PCB grid) -->
        <pattern id="pcb-grid" width="24" height="24" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="0.8" fill="#9099a8" opacity="0.03" />
            <line x1="12" y1="0" x2="12" y2="24" stroke="#9099a8" stroke-width="0.5" stroke-dasharray="1 11" opacity="0.015" />
            <line x1="0" y1="12" x2="24" y2="12" stroke="#9099a8" stroke-width="0.5" stroke-dasharray="1 11" opacity="0.015" />
        </pattern>

        <!-- Blur Filter for the Text Glow -->
        <filter id="blur-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
        </filter>
        
        <!-- Heavy Blur Filter for Ambient Text Glow -->
        <filter id="ambient-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="22" result="blur" />
        </filter>
    </defs>

    <!-- ========================================== -->
    <!-- LAYER 1: Background & Ground Plane Hatch   -->
    <!-- ========================================== -->
    <rect width="800" height="400" fill="url(#bg-grad)" />
    <rect width="800" height="400" fill="url(#pcb-grid)" />

    <!-- ========================================== -->
    <!-- LAYER 2: PCB Traces (+20% Visibility)      -->
    <!-- ========================================== -->
    
    <!-- Faint Ground Pour Planes -->
    <polygon points="50,20 180,20 220,60 140,60 110,90 20,90" fill="#9099a8" opacity="0.01" stroke="#9099a8" stroke-dasharray="2 4" stroke-width="1" />
    <polygon points="780,220 650,220 620,250 620,340 780,340" fill="#9099a8" opacity="0.01" stroke="#9099a8" stroke-dasharray="2 4" stroke-width="1" />

    <!-- Streamlined Circuit Routing with Lower Section Additions -->
    <g stroke="#9099a8" fill="none" opacity="0.09" stroke-linecap="round" stroke-linejoin="round">
        
        <!-- Standard Traces (With 45-degree bends) -->
        <!-- Top Rail & Power Bus -->
        <path d="M -50 40 L 200 40 L 220 60 L 350 60 L 370 40 L 850 40" stroke-width="1.8" />
        
        <!-- Bottom Rail -->
        <path d="M -50 360 L 230 360 L 250 380 L 550 380 L 570 360 L 850 360" stroke-width="1.8" />
        
        <!-- Central Clean Routes -->
        <path d="M 120 -50 L 120 120 L 140 140 L 280 140" stroke-width="1.2" />
        <path d="M 380 -50 L 380 70 L 410 100 L 490 100" stroke-width="1.2" />
        <path d="M 150 40 L 150 100 L 110 140 L -50 140" stroke-width="1.2" />
        
        <!-- Parallel buses to reduce clutter -->
        <g stroke-width="1">
            <path d="M 230 180 L 180 180 L 150 210 L 80 210 L 50 240 L -50 240" />
            <path d="M 230 188 L 182 188 L 152 218 L 82 218 L 52 248 L -50 248" opacity="0.5" />
        </g>

        <path d="M 680 110 L 680 260 L 710 290 L 710 450" stroke-width="1.2" />
        <path d="M 520 70 L 600 70 L 640 110 L 850 110" stroke-width="1.2" />

        <!-- Lower Section Extensions -->
        <path d="M 150 210 L 150 280 L 110 320 L -50 320" stroke-width="1.2" />
        <path d="M 640 110 L 640 280 L 680 320 L 850 320" stroke-width="1.2" />
        <g stroke-width="1">
            <path d="M 250 320 L 300 320 L 320 340 L 480 340 L 500 320 L 550 320" />
            <path d="M 250 328 L 296 328 L 316 348 L 484 348 L 504 328 L 550 328" opacity="0.5" />
        </g>

    </g>

    <!-- Muted Kinetic Pulses (Flowing Energy Highlights - Slow &amp; Subtle) -->
    <g fill="none" stroke="url(#glow-grad)" opacity="0.22" stroke-linecap="round" stroke-linejoin="round">
        <path class="pulse-trace" d="M -50 40 L 200 40 L 220 60 L 350 60 L 370 40 L 850 40" stroke-width="2.0" />
        <path class="pulse-trace-fast" d="M 120 -50 L 120 120 L 140 140 L 280 140" stroke-width="1.5" />
        <path class="pulse-trace" d="M 230 188 L 182 188 L 152 218 L 82 218 L 52 248 L -50 248" stroke-width="1.5" />
        
        <!-- Lower Section Kinetic Pulses -->
        <path class="pulse-trace-fast" d="M 150 210 L 150 280 L 110 320 L -50 320" stroke-width="1.5" />
        <path class="pulse-trace" d="M 640 110 L 640 280 L 680 320 L 850 320" stroke-width="1.5" />
        <path class="pulse-trace-fast" d="M 250 320 L 300 320 L 320 340 L 480 340 L 500 320 L 550 320" stroke-width="1.5" />
    </g>

    <!-- Solder Joints &amp; Vias Layer (Muted Teal/Mint Rings) -->
    <g stroke="#00ffaa" stroke-width="1" fill="#14161f">
        <!-- Normal background static vias -->
        <g opacity="0.18">
            <circle cx="200" cy="40" r="3" /> <circle cx="200" cy="40" r="1" fill="#14161f" stroke="none" />
            <circle cx="220" cy="60" r="3" /> <circle cx="220" cy="60" r="1" fill="#14161f" stroke="none" />
            <circle cx="140" cy="140" r="3" /> <circle cx="140" cy="140" r="1" fill="#14161f" stroke="none" />
            <circle cx="410" cy="100" r="3" /> <circle cx="410" cy="100" r="1" fill="#14161f" stroke="none" />
            <circle cx="470" cy="130" r="3" /> <circle cx="470" cy="130" r="1" fill="#14161f" stroke="none" />
            <circle cx="150" cy="210" r="3" /> <circle cx="150" cy="210" r="1" fill="#14161f" stroke="none" />
            <circle cx="80" cy="210" r="3" /> <circle cx="80" cy="210" r="1" fill="#14161f" stroke="none" />
            <circle cx="640" cy="110" r="3" /> <circle cx="640" cy="110" r="1" fill="#14161f" stroke="none" />
            <circle cx="710" cy="290" r="3" /> <circle cx="710" cy="290" r="1" fill="#14161f" stroke="none" />

            <!-- Lower Section Vias -->
            <circle cx="150" cy="280" r="3" /> <circle cx="150" cy="280" r="1" fill="#14161f" stroke="none" />
            <circle cx="110" cy="320" r="3" /> <circle cx="110" cy="320" r="1" fill="#14161f" stroke="none" />
            <circle cx="640" cy="280" r="3" /> <circle cx="640" cy="280" r="1" fill="#14161f" stroke="none" />
            <circle cx="680" cy="320" r="3" /> <circle cx="680" cy="320" r="1" fill="#14161f" stroke="none" />
            <circle cx="300" cy="320" r="3" /> <circle cx="300" cy="320" r="1" fill="#14161f" stroke="none" />
            <circle cx="500" cy="320" r="3" /> <circle cx="500" cy="320" r="1" fill="#14161f" stroke="none" />
        </g>

        <!-- Ambient slowly pulsing vias at terminal intersections -->
        <g class="glowing-node">
            <circle cx="220" cy="60" r="3" opacity="0.6"><animate attributeName="r" values="3;4.2;3" dur="3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite" /></circle>
            <circle cx="410" cy="100" r="3" opacity="0.6"><animate attributeName="r" values="3;4.2;3" dur="3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite" /></circle>
            <circle cx="710" cy="290" r="3" opacity="0.6"><animate attributeName="r" values="3;4.2;3" dur="3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite" /></circle>
            <!-- Lower Pulsing Nodes -->
            <circle cx="110" cy="320" r="3" opacity="0.6"><animate attributeName="r" values="3;4.2;3" dur="3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite" /></circle>
            <circle cx="680" cy="320" r="3" opacity="0.6"><animate attributeName="r" values="3;4.2;3" dur="3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite" /></circle>
        </g>
    </g>

    <!-- Hardware Components -->
    <g font-family="monospace" font-size="8" font-weight="bold" fill="#9099a8" stroke="none" opacity="0.18">
        
        <!-- ==================== U1 (Top Left IC) ==================== -->
        <g transform="translate(280, 110)">
            <rect width="80" height="60" rx="3" fill="#14151b" stroke="#9099a8" stroke-width="1" stroke-opacity="0.3" />
            <text x="40" y="34" font-size="10" fill="#9099a8" fill-opacity="0.2" text-anchor="middle">U1</text>
            <circle cx="10" cy="10" r="2" fill="#00ffaa" fill-opacity="0.15" />
            
            <!-- Pins Left Side -->
            <g fill="#00ffaa" fill-opacity="0.2">
                <rect x="-8" y="10" width="8" height="3" /> <circle cx="-12" cy="11.5" r="2" />
                <rect x="-8" y="24" width="8" height="3" /> <circle cx="-12" cy="25.5" r="2" />
                <rect x="-8" y="38" width="8" height="3" /> <circle cx="-12" cy="39.5" r="2" />
                <rect x="-8" y="52" width="8" height="3" /> <circle cx="-12" cy="53.5" r="2" />
            </g>
            <!-- Pins Right Side -->
            <g fill="#00ffaa" fill-opacity="0.2">
                <rect x="80" y="10" width="8" height="3" /> <circle cx="92" cy="11.5" r="2" />
                <rect x="80" y="24" width="8" height="3" /> <circle cx="92" cy="25.5" r="2" />
                <rect x="80" y="38" width="8" height="3" /> <circle cx="92" cy="39.5" r="2" />
                <rect x="80" y="52" width="8" height="3" /> <circle cx="92" cy="53.5" r="2" />
            </g>
        </g>

        <!-- ==================== U0 (Left Middle Mini IC) ==================== -->
        <g transform="translate(160, 240)">
            <rect width="16" height="16" rx="2" fill="#14151b" stroke="#9099a8" stroke-width="1" stroke-opacity="0.3" />
            <text x="22" y="10" fill="#9099a8" fill-opacity="0.3">U0</text>
            <circle cx="4" cy="4" r="1.5" fill="#00ffaa" fill-opacity="0.1" />
            <!-- Pins -->
            <circle cx="-3" cy="4" r="1.5" fill="#00ffaa" fill-opacity="0.2" />
            <circle cx="-3" cy="12" r="1.5" fill="#00ffaa" fill-opacity="0.2" />
            <circle cx="19" cy="4" r="1.5" fill="#00ffaa" fill-opacity="0.2" />
            <circle cx="19" cy="12" r="1.5" fill="#00ffaa" fill-opacity="0.2" />
        </g>

        <!-- ==================== U2 (Bottom Left IC) ==================== -->
        <g transform="translate(80, 290)">
            <rect width="30" height="30" rx="2" fill="#14151b" stroke="#9099a8" stroke-width="1" stroke-opacity="0.3" />
            <text x="15" y="18" font-size="9" fill="#9099a8" fill-opacity="0.3" text-anchor="middle">U2</text>
            <circle cx="4" cy="4" r="1.5" fill="#00ffaa" fill-opacity="0.15" />
            <!-- Pins Left Side -->
            <g fill="#00ffaa" fill-opacity="0.2">
                <rect x="-6" y="5" width="6" height="2" /> <circle cx="-8" cy="6" r="1.5" />
                <rect x="-6" y="15" width="6" height="2" /> <circle cx="-8" cy="16" r="1.5" />
                <rect x="-6" y="25" width="6" height="2" /> <circle cx="-8" cy="26" r="1.5" />
            </g>
            <!-- Pins Right Side -->
            <g fill="#00ffaa" fill-opacity="0.2">
                <rect x="30" y="5" width="6" height="2" /> <circle cx="38" cy="6" r="1.5" />
                <rect x="30" y="15" width="6" height="2" /> <circle cx="38" cy="16" r="1.5" />
                <rect x="30" y="25" width="6" height="2" /> <circle cx="38" cy="26" r="1.5" />
            </g>
        </g>

        <!-- ==================== U3 (Bottom Right IC) ==================== -->
        <g transform="translate(620, 290)">
            <rect width="40" height="40" rx="2" fill="#14151b" stroke="#9099a8" stroke-width="1" stroke-opacity="0.3" />
            <text x="20" y="23" font-size="9" fill="#9099a8" fill-opacity="0.3" text-anchor="middle">U3</text>
            <circle cx="5" cy="5" r="1.5" fill="#00ffaa" fill-opacity="0.15" />
            <!-- Pins Left Side -->
            <g fill="#00ffaa" fill-opacity="0.2">
                <rect x="-6" y="8" width="6" height="2" /> <circle cx="-8" cy="9" r="1.5" />
                <rect x="-6" y="20" width="6" height="2" /> <circle cx="-8" cy="21" r="1.5" />
                <rect x="-6" y="32" width="6" height="2" /> <circle cx="-8" cy="33" r="1.5" />
            </g>
            <!-- Pins Right Side -->
            <g fill="#00ffaa" fill-opacity="0.2">
                <rect x="40" y="8" width="6" height="2" /> <circle cx="48" cy="9" r="1.5" />
                <rect x="40" y="20" width="6" height="2" /> <circle cx="48" cy="21" r="1.5" />
                <rect x="40" y="32" width="6" height="2" /> <circle cx="48" cy="33" r="1.5" />
            </g>
        </g>

        <!-- SMD Resistor -->
        <g transform="translate(200, 53)">
            <rect width="16" height="8" rx="1" fill="#1e2029" stroke="#9099a8" stroke-width="0.8" stroke-opacity="0.2" />
            <rect width="3" height="8" fill="#00ffaa" fill-opacity="0.25" />
            <rect x="13" width="3" height="8" fill="#00ffaa" fill-opacity="0.25" />
            <text x="8" y="-4" text-anchor="middle">R1</text>
        </g>
        
        <g transform="translate(420, 59)">
            <rect width="12" height="10" rx="1" fill="#252a3a" stroke="#9099a8" stroke-width="0.8" stroke-opacity="0.2" />
            <text x="6" y="-5" text-anchor="middle">C1</text>
        </g>
    </g>

    <!-- ========================================== -->
    <!-- LAYER 3: Main Typography & Mint Glow       -->
    <!-- ========================================== -->
    <!-- Ambient Base Glow (Wide Blur) -->
    <text x="400" y="215" font-size="84" font-weight="600" text-anchor="middle" fill="url(#glow-grad)" filter="url(#ambient-glow)" opacity="0.28">MARM-Systems</text>
    
    <!-- Tight Neon Glow -->
    <text x="400" y="215" font-size="84" font-weight="600" text-anchor="middle" fill="url(#glow-grad)" filter="url(#blur-glow)" opacity="0.55">MARM-Systems</text>
    
    <!-- Crisp White Core Text -->
    <text x="400" y="215" font-size="84" font-weight="600" text-anchor="middle" fill="#ffffff" letter-spacing="1">MARM-Systems</text>

    <!-- ========================================== -->
    <!-- LAYER 4: Declarative SMIL Loading Console  -->
    <!-- ========================================== -->
    <g transform="translate(0, 30)">
        
        <!-- ========================================== -->
        <!-- PART A: Pure SMIL Loading Sequence         -->
        <!-- ========================================== -->
        <g id="loading-group">
            <!-- Loading Text Counter Driven entirely by discrete SMIL frames -->
            <text x="400" y="264" font-size="13" font-family="monospace" font-weight="bold" fill="#ffffff" opacity="0.95" text-anchor="middle" letter-spacing="2">LOADING...</text>

            <!-- Loading Bar Container (Outline) -->
            <rect x="230" y="276" width="340" height="12" rx="6" fill="none" stroke="#9099a8" stroke-width="1" stroke-opacity="0.25" />

            <!-- Loading Bar Fill (Grows from width 1 to 334 automatically) -->
            <rect id="loading-fill" x="233" y="279" height="6" rx="3" fill="url(#bar-grad)" opacity="0.9">
                <animate 
                    attributeName="width" 
                    from="1" 
                    to="334" 
                    dur="3.2s" 
                    fill="freeze" 
                    calcMode="spline" 
                    keyTimes="0;1" 
                    keySplines="0.4 0 0.2 1" />
            </rect>

            <!-- Dynamic Fade-out of loading components when completed -->
            <animate 
                attributeName="opacity" 
                from="1" 
                to="0" 
                begin="3.4s" 
                dur="0.6s" 
                fill="freeze" />
            
        </g>

        <!-- ========================================== -->
        <!-- PART B: Glowing Reveal: MEMORY UNLOCKED   -->
        <!-- ========================================== -->
        <g id="unlocked-reveal">
            <!-- "MEMORY UNLOCKED" starts fully hidden and fades in in the center -->
            <text id="unlocked-txt" x="400" y="281" font-size="12" font-family="monospace" font-weight="900" fill="#00ffaa" text-anchor="middle" letter-spacing="3" opacity="0" style="text-shadow: 0 0 8px rgba(0, 255, 170, 0.75);">
                MEMORY UNLOCKED
                
                <animate 
                    attributeName="opacity" 
                    from="0" 
                    to="0.95" 
                    begin="3.8s" 
                    dur="0.8s" 
                    fill="freeze" />
            </text>
        </g>
    </g>
</svg>