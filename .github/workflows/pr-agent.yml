name: PR Agent
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
      checks: write
      statuses: write
    steps:
      - name: PR Agent
        uses: the-pr-agent/pr-agent@main
        env:
          OPENAI__KEY: ${{ secrets.PROXY_API_KEY }}
          OPENAI__API_BASE: ${{ secrets.PROXY_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG__MODEL: "openai/deepseek-v4-pro-thinking"
          CONFIG__FALLBACK_MODELS: '["openai/deepseek-v4-pro-thinking"]'
