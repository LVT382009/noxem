 name: PR Agent
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: PR Agent
        uses: the-pr-agent/pr-agent@main
        env:
          OPENAI__KEY: ${{ secrets.PROXY_API_KEY }}       # double underscore
          OPENAI__API_BASE: ${{ secrets.PROXY_URL }}      # double underscore
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
