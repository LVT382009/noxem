name: PR Agent
on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      pull-requests: write
      contents: write
      checks: write
      statuses: write
    steps:
      - name: PR Agent
        uses: the-pr-agent/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          OPENAI__KEY: ${{ secrets.OPENAI_KEY }}
          OPENAI__API_BASE: ${{ secrets.PROXY_URL }}
          OPENAI__CUSTOM_LLM_PROVIDER: "openai"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG__MODEL: "openai/deepseek-v4-pro-thinking"
          CONFIG__MODEL_TURBO: "openai/deepseek-v4-pro-thinking"
          CONFIG__FALLBACK_MODELS: '["openai/deepseek-v4-pro-thinking"]'
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "32768"
          CONFIG__DUPLICATE_EXAMPLES: "true"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'
