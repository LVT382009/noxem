version: '3.8'

services:
  qwen2api:
    build: .
    container_name: qwen2api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - SERVICE_PORT=3000
      - API_KEY=${API_KEY}
      - ACCOUNTS=${ACCOUNTS}
      - DATA_SAVE_MODE=none
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
